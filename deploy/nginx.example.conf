# Exemplo: /etc/nginx/sites-available/app.bridalcreative.com.br
# Tudo (incluindo /api) deve ir para o Node na porta 3000.

server {
    listen 80;
    listen 443 ssl;
    server_name app.bridalcreative.com.br;

    # ssl_certificate ... (certbot / seu certificado)

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
